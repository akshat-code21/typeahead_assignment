services:
  redis:
    image: redis:7
    container_name: typeahead_redis
    ports:
      - 6379:6379
  backend:
    build: ./backend
    container_name: typeahead_backend
    ports:
      - 8080:8080
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
