server:
  port: 8080

spring:
  application:
    name: typeahead
  datasource:
    url: jdbc:postgresql://ep-restless-waterfall-aooqlh64-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?user=neondb_owner&password=npg_UzD4BKFnw5qR&sslmode=require&channelBinding=require
    username: neondb_owner
    password: npg_UzD4BKFnw5qR
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: ${REDIS_TIMEOUT:10000ms}

typeahead:
  cache:
    ttl-seconds: 300
    key-prefix: "typeahead:suggest:"
  batch:
    flush-interval-seconds: 10
    flush-threshold: 100
  trending:
    window-minutes: 60
    decay-factor: 0.95
  dataset:
    path: classpath:data/queries.csv

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
