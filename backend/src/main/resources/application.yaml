server:
  port: 8080

spring:
  application:
    name: typeahead
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/typeahead}
    username: ${SPRING_DATASOURCE_USERNAME:typeahead}
    password: ${SPRING_DATASOURCE_PASSWORD:typeahead}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      timeout: ${REDIS_TIMEOUT:10000ms}

typeahead:
  suggestions:
    candidate-limit: 100
  cache:
    ttl-seconds: 300
    key-prefix: "typeahead:suggest:"
  batch:
    flush-interval-seconds: 10
    flush-threshold: 100
  trending:
    window-minutes: 60
    decay-factor: 0.95
  dataset:
    path: classpath:data/queries.csv

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
